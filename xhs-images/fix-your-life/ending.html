<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>结尾 - 开始行动</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 900px;
  height: 1200px;
  background: linear-gradient(180deg, #FAFBFC 0%, #FEF3C7 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  padding: 60px;
  display: flex;
  flex-direction: column;
}
.hero {
  text-align: center;
  margin-bottom: 50px;
}
.fire { font-size: 80px; margin-bottom: 20px; }
.title {
  font-size: 56px;
  font-weight: 700;
  color: #1F2937;
  margin-bottom: 16px;
}
.subtitle {
  font-size: 32px;
  color: #6B7280;
}
.benefits {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  margin: 40px 0;
}
.benefit {
  background: white;
  padding: 32px;
  border-radius: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  text-align: center;
}
.benefit-icon { font-size: 52px; margin-bottom: 16px; }
.benefit-title {
  font-size: 32px;
  font-weight: 700;
  color: #1F2937;
}
.tip-box {
  background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%);
  padding: 28px 36px;
  border-radius: 20px;
  margin: 30px 0;
  display: flex;
  align-items: center;
  gap: 20px;
}
.tip-icon { font-size: 44px; }
.tip-text {
  font-size: 28px;
  color: #1E40AF;
  font-weight: 600;
}
.cta-button {
  background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
  color: white;
  font-size: 40px;
  font-weight: 700;
  text-align: center;
  padding: 32px;
  border-radius: 20px;
  margin: 30px 0;
  box-shadow: 0 8px 24px rgba(251, 191, 36, 0.4);
}
.interaction {
  background: white;
  padding: 32px;
  border-radius: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  margin-top: auto;
}
.interaction-title {
  font-size: 32px;
  font-weight: 700;
  color: #1F2937;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.interaction-text {
  font-size: 28px;
  color: #4B5563;
  line-height: 1.6;
}
.arrow { font-size: 36px; color: #F59E0B; text-align: center; margin-top: 16px; }
.tags {
  display: flex;
  gap: 16px;
  margin-top: 30px;
  justify-content: center;
  flex-wrap: wrap;
}
.tag {
  padding: 12px 24px;
  background: white;
  border-radius: 30px;
  font-size: 24px;
  color: #6B7280;
  border: 2px solid #E5E7EB;
}
</style>
</head>
<body>
  <div class="hero">
    <div class="fire">🔥</div>
    <div class="title">今天就开始你的重启日</div>
    <div class="subtitle">24小时后，你会感谢现在的自己</div>
  </div>
  
  <div class="benefits">
    <div class="benefit">
      <div class="benefit-icon">🧠</div>
      <div class="benefit-title">清晰思维</div>
    </div>
    <div class="benefit">
      <div class="benefit-icon">🎯</div>
      <div class="benefit-title">明确目标</div>
    </div>
    <div class="benefit">
      <div class="benefit-icon">📋</div>
      <div class="benefit-title">可执行计划</div>
    </div>
    <div class="benefit">
      <div class="benefit-icon">💪</div>
      <div class="benefit-title">掌控感</div>
    </div>
  </div>
  
  <div class="tip-box">
    <span class="tip-icon">📌</span>
    <span class="tip-text">建议每3-6个月进行一次人生重启日</span>
  </div>
  
  <div class="cta-button">
    收藏这篇，明天就开始！✨
  </div>
  
  <div class="interaction">
    <div class="interaction-title">
      💬 互动时间
    </div>
    <div class="interaction-text">
      你最想修复人生的哪个方面？\n在评论区告诉我，我们一起加油！👇
    </div>
    <div class="arrow">⬇️⬇️⬇️</div>
  </div>
  
  <div class="tags">
    <span class="tag">#人生重启</span>
    <span class="tag">#自我提升</span>
    <span class="tag">#生产力</span>
    <span class="tag">#目标管理</span>
    <span class="tag">#自律</span>
  </div>
</body>
</html>
