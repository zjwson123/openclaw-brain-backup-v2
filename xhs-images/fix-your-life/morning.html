<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上午篇 - 环境清理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 900px;
  height: 1200px;
  background: #FAFBFC;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  padding: 60px;
}
.header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 50px;
}
.sun { font-size: 80px; }
.title {
  font-size: 56px;
  font-weight: 700;
  color: #1F2937;
}
.subtitle {
  font-size: 32px;
  color: #6B7280;
  font-weight: 400;
}
.container {
  display: flex;
  gap: 30px;
  margin-top: 40px;
}
.card {
  flex: 1;
  background: white;
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.card.before { border-top: 6px solid #9CA3AF; }
.card.after { border-top: 6px solid #FBBF24; }
.card-title {
  font-size: 36px;
  font-weight: 600;
  margin-bottom: 30px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.card.before .card-title { color: #6B7280; }
.card.after .card-title { color: #D97706; }
.icon { font-size: 44px; }
.item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  font-size: 28px;
  color: #4B5563;
  line-height: 1.5;
}
.item-icon { font-size: 32px; flex-shrink: 0; }
.quote {
  margin-top: 50px;
  padding: 30px 40px;
  background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
  border-radius: 20px;
  border-left: 6px solid #F59E0B;
}
.quote-text {
  font-size: 32px;
  color: #92400E;
  font-weight: 600;
  font-style: italic;
}
</style>
</head>
<body>
  <div class="header">
    <span class="sun">🌅</span>
    <div>
      <div class="title">上午：环境大扫除</div>
      <div class="subtitle">清理你的物理和数字空间</div>
    </div>
  </div>
  
  <div class="container">
    <div class="card before">
      <div class="card-title"><span class="icon">😵</span> 整理前</div>
      <div class="item">
        <span class="item-icon">📦</span>
        <span>桌面堆满杂物\n床铺凌乱不堪</span>
      </div>
      <div class="item">
        <span class="item-icon">💻</span>
        <span>999+未读邮件\n满屏文件图标</span>
      </div>
      <div class="item">
        <span class="item-icon">📱</span>
        <span>手机App泛滥\n推送轰炸不停</span>
      </div>
    </div>
    
    <div class="card after">
      <div class="card-title"><span class="icon">✨</span> 整理后</div>
      <div class="item">
        <span class="item-icon">🌿</span>
        <span>桌面只有必需品\n绿植点缀生机</span>
      </div>
      <div class="item">
        <span class="item-icon">📁</span>
        <span>文件归档分类\n邮箱清零干净</span>
      </div>
      <div class="item">
        <span class="item-icon">🧘</span>
        <span>只留核心App\n退订无用推送</span>
      </div>
    </div>
  </div>
  
  <div class="quote">
    <div class="quote-text">💡 "物理环境就是心理状态"</div>
  </div>
</body>
</html>
