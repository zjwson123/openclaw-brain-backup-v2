<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下午篇 - 目标设定</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 900px;
  height: 1200px;
  background: #FAFBFC;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  padding: 60px;
}
.header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 40px;
}
.sun { font-size: 70px; }
.title {
  font-size: 52px;
  font-weight: 700;
  color: #1F2937;
}
.subtitle {
  font-size: 30px;
  color: #6B7280;
}
.pyramid {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin: 30px 0;
}
.level {
  background: white;
  border-radius: 20px;
  padding: 30px 40px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  gap: 20px;
}
.level-1 { width: 90%; border-left: 6px solid #DC2626; }
.level-2 { width: 75%; border-left: 6px solid #2563EB; }
.level-3 { width: 60%; border-left: 6px solid #10B981; }
.level-icon { font-size: 48px; }
.level-content { flex: 1; }
.level-title {
  font-size: 32px;
  font-weight: 700;
  color: #1F2937;
  margin-bottom: 8px;
}
.level-desc {
  font-size: 26px;
  color: #6B7280;
}
.smart-box {
  margin-top: 40px;
  padding: 30px;
  background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
  border-radius: 20px;
}
.smart-title {
  font-size: 28px;
  font-weight: 700;
  color: #1E40AF;
  margin-bottom: 20px;
}
.smart-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 15px;
}
.smart-item {
  text-align: center;
  padding: 20px 10px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.smart-letter {
  font-size: 40px;
  font-weight: 800;
  color: #3B82F6;
}
.smart-word {
  font-size: 22px;
  color: #1F2937;
  font-weight: 600;
  margin-top: 8px;
}
</style>
</head>
<body>
  <div class="header">
    <span class="sun">🌞</span>
    <div>
      <div class="title">下午：找回人生方向</div>
      <div class="subtitle">回顾过去，设定清晰目标</div>
    </div>
  </div>
  
  <div class="pyramid">
    <div class="level level-1">
      <span class="level-icon">🔝</span>
      <div class="level-content">
        <div class="level-title">年度核心目标</div>
        <div class="level-desc">1个足够聚焦的大目标</div>
      </div>
    </div>
    <div class="level level-2">
      <span class="level-icon">🎯</span>
      <div class="level-content">
        <div class="level-title">3个月里程碑</div>
        <div class="level-desc">3个中期关键节点</div>
      </div>
    </div>
    
    <div class="level level-3">
      <span class="level-icon">✅</span>
      <div class="level-content">
        <div class="level-title">本周行动清单</div>
        <div class="level-desc">5个明天就能做的事</div>
      </div>
    </div>
  </div>
  
  <div class="smart-box">
    <div class="smart-title">🎯 SMART原则：让目标更可执行</div>
    <div class="smart-grid">
      <div class="smart-item">
        <div class="smart-letter">S</div>
        <div class="smart-word">具体</div>
      </div>
      <div class="smart-item">
        <div class="smart-letter">M</div>
        <div class="smart-word">可衡量</div>
      </div>
      <div class="smart-item">
        <div class="smart-letter">A</div>
        <div class="smart-word">可达成</div>
      </div>
      <div class="smart-item">
        <div class="smart-letter">R</div>
        <div class="smart-word">相关</div>
      </div>
      <div class="smart-item">
        <div class="smart-letter">T</div>
        <div class="smart-word">有时限</div>
      </div>
    </div>
  </div>
</body>
</html>
